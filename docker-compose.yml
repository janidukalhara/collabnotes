version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: collabnotes_mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: collabnotes

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: collabnotes_server
    restart: unless-stopped
    ports:
      - '5000:5000'
    env_file:
      - ./server/.env
    depends_on:
      - mongo
    environment:
      MONGODB_URI: mongodb://mongo:27017/collabnotes

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: collabnotes_client
    restart: unless-stopped
    ports:
      - '5173:80'
    depends_on:
      - server

volumes:
  mongo_data:
